services:
  - type: web
    name: restaurant-rec-api
    runtime: python
    buildCommand: pip install -e .
    startCommand: uvicorn restaurant_rec.phase4.app:create_app --factory --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.0
    healthCheckPath: /health
    autoDeploy: true
